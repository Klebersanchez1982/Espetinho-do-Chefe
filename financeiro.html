<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
    <title>Financeiro</title>
</head>
<body>
    <h1>📈 Vendas Totais</h1>
    <div id="res"></div>
    <script>
        fetch('https://script.google.com/macros/library/d/1pLSxwbC8IOxGnxx2zWbQlmSjthXqpHZscqtRa1_PFlcFCNXmi13rjE5A/2').then(res => res.json()).then(data => {
            let total = 0;
            data.slice(1).forEach(r => { if(r[5] === "Pago") total += r[4]; });
            document.getElementById('res').innerHTML = `<h2>R$ ${total.toFixed(2)}</h2>`;
        });
    </script>
</body>
</html>
